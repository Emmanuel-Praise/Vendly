version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agro-backend
    container_name: agro-app
    restart: unless-stopped
    tty: true
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - agro-network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: agro-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - agro-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: agro-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-agro_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - agro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  agro-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
